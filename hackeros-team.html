<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HackerOS - Team</title><link rel="icon" type="image/png" href="HackerOS.png"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif;}body{background-color:#1C2526;color:#FFF;line-height:1.6;}header{background-color:#121212;padding:20px 0;position:fixed;width:100%;top:0;z-index:1000;box-shadow:0 4px 10px rgba(0,0,0,.7);transition:background-color .3s;}header:hover{background-color:#1A1A1A;}nav{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:0 20px;}nav .logo img{height:40px;width:auto;}nav ul{list-style:none;display:flex;gap:25px;align-items:center;}nav ul li a{color:#FFF;text-decoration:none;font-size:17px;transition:color .3s,transform .3s;position:relative;}nav ul li a::after{content:'';position:absolute;width:0;height:2px;bottom:-5px;left:0;background-color:#B0B0B0;transition:width .3s;}nav ul li a:hover::after{width:100%;}nav ul li a:hover{color:#B0B0B0;transform:translateY(-2px);}.team-section{max-width:1200px;margin:120px auto 50px;padding:20px;text-align:center;}.team-section h1{font-size:36px;margin-bottom:20px;text-shadow:2px 2px 4px rgba(0,0,0,.5);}.team-member{margin:20px 0;padding:20px;background-color:#2F3A44;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,.3);transition:transform .3s,box-shadow .3s;}.team-member:hover{transform:translateY(-5px);box-shadow:0 6px 15px rgba(0,0,0,.4);}.team-member img{width:100px;height:100px;border-radius:50%;margin-bottom:10px;}.team-member h2{font-size:24px;margin-bottom:10px;}.team-member p{color:#B0B0B0;}footer{background-color:#121212;padding:20px;text-align:center;color:#B0B0B0;width:100%;box-shadow:0 -2px 5px rgba(0,0,0,.5);}</style></head>
<body>
<header><nav><div class="logo"><img src="HackerOS.png" alt="HackerOS Logo"></div><ul><li><a id="nav-home" href="Home-page.html">Home</a></li><li><a id="nav-download" href="download.html">Download</a></li><li><a id="nav-releases" href="releases.html">Releases</a></li><li><a id="nav-team" href="hackeros-team.html">HackerOS Team</a></li><li><a id="nav-docs" href="hackeros-documentation.html">Documentation</a></li></ul></nav></header>

<script>
function applyLang(lang){const t=window.HACKEROS_TRANS_TEAM[lang];if(!t)return;document.documentElement.lang=lang;document.title=t.pageTitle;document.getElementById('team-h1').textContent=t.sectionH1;document.getElementById('member0-role').textContent=t.member0Role;document.getElementById('footer-copy').textContent=t.footerCopy;document.getElementById('nav-home').textContent=t.navHome;document.getElementById('nav-download').textContent=t.navDownload;document.getElementById('nav-releases').textContent=t.navReleases;document.getElementById('nav-team').textContent=t.navTeam;document.getElementById('nav-docs').textContent=t.navDocs;}
window.__hackeros_applyLang=applyLang;
document.addEventListener('DOMContentLoaded',()=>{applyLang(window.HackerLang.getLang());});
</script></body></html>
